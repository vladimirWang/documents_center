syntax = "proto3";

package client;

service ClientService {
  rpc Register(RegisterRequest) returns (RegisterResponse);
}

message RegisterRequest {
  string email = 1;
  string password = 2;
}

message ClientInfo {
  int32 id = 1;
  string email = 2;
  string mobile = 3;
  string created_at = 4;
  string updated_at = 5;
}

message RegisterResponse {
  int32 code = 1;
  string message = 2;
  ClientInfo client = 3;
}
