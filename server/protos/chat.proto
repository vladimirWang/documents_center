syntax = "proto3";

package chat;

service ChatService {
  rpc Ask(ChatRequest) returns (ChatResponse);
  rpc GetCurrentUserSessions(GetCurrentUserSessionsRequest) returns (GetCurrentUserSessionsResponse);
  rpc GetChatSessionById(GetChatSessionByIdRequest) returns (GetChatSessionByIdResponse);
}

message ChatRequest {
  string question = 1;
  string session_id = 2;
  int32 user_id = 3;
}

message ChatResponse {
  int32 code = 1;
  string message = 2;
  string answer = 3;
}

message GetCurrentUserSessionsRequest {
  int32 user_id = 1;
}

message ChatSessionInfo {
  string id = 1;
  int32 user_id = 2;
  string created_at = 3;
  string updated_at = 4;
}

message GetCurrentUserSessionsResponse {
  int32 code = 1;
  string message = 2;
  repeated ChatSessionInfo sessions = 3;
}

message GetChatSessionByIdRequest {
  string session_id = 1;
  int32 user_id = 2;
}

message ChatMessageInfo {
  string role = 1;
  string content = 2;
}

message GetChatSessionByIdResponse {
  int32 code = 1;
  string message = 2;
  ChatSessionInfo session = 3;
  repeated ChatMessageInfo messages = 4;
}
